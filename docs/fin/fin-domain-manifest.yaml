          - {code: FIN_ACCT_TRIAL, name: 試算表, desc: 借方・貸方残高の一覧, name_zh: 试算表, name_en: Trial Balance, icon: DataAnalysis, path: /fin/accounting/trial-balance, view: report, domain: accounting, entity: JournalLine}
