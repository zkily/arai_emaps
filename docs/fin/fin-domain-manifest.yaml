# =============================================================================
# FIN（経理・原価・人事）ドメイン定義 — 単一ソース
# scripts/fin/fin_codegen.py がこのファイルを読み、DB / backend / frontend /
# menu / router / locales / sidebar を生成する。
#
# 列タイプ: str(len) / text / int / bigint / dec(p,s) / date / datetime / bool
# 監査列 (id, created_by, updated_by, created_at, updated_at) は自動付与。
# =============================================================================
version: 1
module: fin
api_prefix: /api/fin          # main.py 注册前缀（既存モジュールと同様 /api/<module>）
route_prefix: /fin            # フロントルート前缀
menu_root: FIN
menu_sort_order: 3.5          # MES(3) と MASTER(4) の間

# -----------------------------------------------------------------------------
# ドメイン & エンティティ（DB テーブル + Model + Schema + 汎用 CRUD API）
# -----------------------------------------------------------------------------
domains:
  - id: accounting
    label: 会計
    label_zh: 会计
    entities:
      - name: FiscalYear
        table: fin_fiscal_year
        columns:
          - {name: code, type: str, len: 20, nullable: false, unique: true, comment: 会計年度コード}
          - {name: name, type: str, len: 50, nullable: false, comment: 名称}
          - {name: start_date, type: date, nullable: false, comment: 期首}
          - {name: end_date, type: date, nullable: false, comment: 期末}
          - {name: status, type: str, len: 20, default: open, comment: open/closed}
      - name: AccountingPeriod
        table: fin_accounting_period
        columns:
          - {name: fiscal_year_id, type: bigint, fk: fin_fiscal_year.id, on_delete: CASCADE, comment: 会計年度}
          - {name: year_month, type: str, len: 7, nullable: false, index: true, comment: YYYY-MM}
          - {name: status, type: str, len: 20, default: open, comment: open/closing/closed}
          - {name: closed_at, type: datetime, comment: 締め日時}
      - name: JournalEntry
        table: fin_journal_entry
        order_by: entry_date desc
        columns:
          - {name: journal_no, type: str, len: 40, index: true, comment: 仕訳番号}
          - {name: entry_date, type: date, nullable: false, index: true, comment: 仕訳日}
          - {name: period_ym, type: str, len: 7, index: true, comment: 計上年月}
          - {name: entry_type, type: str, len: 30, default: manual, comment: manual/sales/purchase/transfer/manufacturing/depreciation/payroll}
          - {name: description, type: str, len: 255, comment: 摘要}
          - {name: total_debit, type: dec, p: 18, s: 2, default: 0, comment: 借方合計}
          - {name: total_credit, type: dec, p: 18, s: 2, default: 0, comment: 貸方合計}
          - {name: status, type: str, len: 20, default: draft, index: true, comment: draft/posted/canceled}
          - {name: source_id, type: bigint, comment: fin_journal_source.id}
        children:
          - name: JournalLine
            table: fin_journal_line
            parent_fk: entry_id
            columns:
              - {name: line_no, type: int, default: 1, comment: 行番号}
              - {name: account_code, type: str, len: 50, index: true, comment: 勘定科目}
              - {name: account_name, type: str, len: 100, comment: 科目名}
              - {name: debit, type: dec, p: 18, s: 2, default: 0, comment: 借方}
              - {name: credit, type: dec, p: 18, s: 2, default: 0, comment: 貸方}
              - {name: tax_code, type: str, len: 20, comment: 税区分}
              - {name: tax_amount, type: dec, p: 18, s: 2, default: 0, comment: 消費税額}
              - {name: department_code, type: str, len: 50, comment: 部門}
              - {name: partner_id, type: int, comment: 取引先}
              - {name: remarks, type: str, len: 255, comment: 備考}
      - name: JournalSource
        table: fin_journal_source
        order_by: created_at desc
        columns:
          - {name: source_type, type: str, len: 40, nullable: false, index: true, comment: SALES_POSTED 等}
          - {name: source_module, type: str, len: 30, comment: erp/expense/payroll}
          - {name: source_ref, type: str, len: 100, index: true, comment: 元伝票番号/ID}
          - {name: event_date, type: date, comment: 事象日}
          - {name: amount, type: dec, p: 18, s: 2, default: 0, comment: 金額}
          - {name: payload_json, type: text, comment: 連携ペイロード}
          - {name: status, type: str, len: 20, default: pending, index: true, comment: pending/generated/skipped}
          - {name: journal_entry_id, type: bigint, comment: 生成された仕訳}

  - id: receivables
    label: 売上・請求
    label_zh: 销售·应收
    entities:
      - name: ArInvoice
        table: fin_ar_invoice
        order_by: invoice_date desc
        columns:
          - {name: invoice_no, type: str, len: 40, index: true, comment: 請求番号}
          - {name: partner_id, type: int, index: true, comment: 取引先}
          - {name: partner_name, type: str, len: 200, comment: 取引先名}
          - {name: invoice_date, type: date, nullable: false, comment: 請求日}
          - {name: due_date, type: date, comment: 支払期限}
          - {name: subtotal, type: dec, p: 18, s: 2, default: 0, comment: 税抜}
          - {name: tax_amount, type: dec, p: 18, s: 2, default: 0, comment: 消費税}
          - {name: total_amount, type: dec, p: 18, s: 2, default: 0, comment: 税込合計}
          - {name: paid_amount, type: dec, p: 18, s: 2, default: 0, comment: 入金済}
          - {name: status, type: str, len: 20, default: draft, index: true, comment: draft/issued/paid/overdue}
          - {name: source_invoice_id, type: int, comment: ERP 請求書連携}
        children:
          - name: ArInvoiceLine
            table: fin_ar_invoice_line
            parent_fk: invoice_id
            columns:
              - {name: line_no, type: int, default: 1}
              - {name: item_name, type: str, len: 200, comment: 品目}
              - {name: quantity, type: dec, p: 18, s: 4, default: 0}
              - {name: unit_price, type: dec, p: 18, s: 4, default: 0}
              - {name: tax_code, type: str, len: 20}
              - {name: amount, type: dec, p: 18, s: 2, default: 0}
              - {name: account_code, type: str, len: 50, comment: 売上科目}
      - name: ArReceipt
        table: fin_ar_receipt
        order_by: receipt_date desc
        columns:
          - {name: receipt_no, type: str, len: 40, index: true, comment: 入金番号}
          - {name: partner_id, type: int, index: true}
          - {name: receipt_date, type: date, nullable: false, comment: 入金日}
          - {name: amount, type: dec, p: 18, s: 2, default: 0, comment: 入金額}
          - {name: method, type: str, len: 30, comment: 振込/手形/現金}
          - {name: bank_account_id, type: int, comment: 入金口座}
          - {name: status, type: str, len: 20, default: unmatched, index: true, comment: unmatched/matched}
        children:
          - name: ArReceiptAllocation
            table: fin_ar_receipt_allocation
            parent_fk: receipt_id
            columns:
              - {name: invoice_id, type: bigint, index: true, comment: 消込対象請求}
              - {name: allocated_amount, type: dec, p: 18, s: 2, default: 0, comment: 充当額}

  - id: payables
    label: 仕入・支払
    label_zh: 采购·应付
    entities:
      - name: ApBill
        table: fin_ap_bill
        order_by: bill_date desc
        columns:
          - {name: bill_no, type: str, len: 40, index: true, comment: 仕入請求番号}
          - {name: partner_id, type: int, index: true, comment: 仕入先}
          - {name: partner_name, type: str, len: 200}
          - {name: bill_date, type: date, nullable: false, comment: 請求日}
          - {name: due_date, type: date, comment: 支払期限}
          - {name: subtotal, type: dec, p: 18, s: 2, default: 0}
          - {name: tax_amount, type: dec, p: 18, s: 2, default: 0}
          - {name: total_amount, type: dec, p: 18, s: 2, default: 0}
          - {name: paid_amount, type: dec, p: 18, s: 2, default: 0}
          - {name: status, type: str, len: 20, default: draft, index: true, comment: draft/confirmed/paid}
        children:
          - name: ApBillLine
            table: fin_ap_bill_line
            parent_fk: bill_id
            columns:
              - {name: line_no, type: int, default: 1}
              - {name: item_name, type: str, len: 200}
              - {name: quantity, type: dec, p: 18, s: 4, default: 0}
              - {name: unit_price, type: dec, p: 18, s: 4, default: 0}
              - {name: tax_code, type: str, len: 20}
              - {name: amount, type: dec, p: 18, s: 2, default: 0}
              - {name: account_code, type: str, len: 50, comment: 費用/仕入科目}
      - name: ApPayment
        table: fin_ap_payment
        order_by: payment_date desc
        columns:
          - {name: payment_no, type: str, len: 40, index: true, comment: 支払番号}
          - {name: partner_id, type: int, index: true}
          - {name: payment_date, type: date, nullable: false, comment: 支払日}
          - {name: amount, type: dec, p: 18, s: 2, default: 0}
          - {name: method, type: str, len: 30, comment: 振込/手形}
          - {name: bank_account_id, type: int, comment: 出金口座}
          - {name: status, type: str, len: 20, default: scheduled, index: true, comment: scheduled/paid}
        children:
          - name: ApPaymentAllocation
            table: fin_ap_payment_allocation
            parent_fk: payment_id
            columns:
              - {name: bill_id, type: bigint, index: true, comment: 消込対象仕入請求}
              - {name: allocated_amount, type: dec, p: 18, s: 2, default: 0}

  - id: expense
    label: 経費精算
    label_zh: 费用报销
    entities:
      - name: ExpenseCategory
        table: fin_expense_category
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: 経費区分コード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: account_code, type: str, len: 50, comment: 対応勘定科目}
          - {name: tax_code, type: str, len: 20}
          - {name: is_active, type: bool, default: true}
      - name: ExpensePolicyRule
        table: fin_expense_policy_rule
        columns:
          - {name: category_code, type: str, len: 30, index: true, comment: 経費区分}
          - {name: name, type: str, len: 100, comment: ルール名}
          - {name: max_amount, type: dec, p: 18, s: 2, comment: 上限金額}
          - {name: requires_receipt, type: bool, default: true, comment: 領収書必須}
          - {name: remarks, type: str, len: 255}
      - name: ExpenseApplication
        table: fin_expense_application
        order_by: applied_date desc
        columns:
          - {name: application_no, type: str, len: 40, index: true, comment: 申請番号}
          - {name: employee_id, type: int, index: true, comment: 申請者}
          - {name: employee_name, type: str, len: 100}
          - {name: applied_date, type: date, nullable: false, comment: 申請日}
          - {name: title, type: str, len: 200, comment: 件名}
          - {name: total_amount, type: dec, p: 18, s: 2, default: 0}
          - {name: status, type: str, len: 20, default: draft, index: true, comment: draft/submitted/approved/rejected/paid}
          - {name: approver_id, type: int, comment: 承認者}
          - {name: approved_at, type: datetime}
        children:
          - name: ExpenseLine
            table: fin_expense_line
            parent_fk: application_id
            columns:
              - {name: line_no, type: int, default: 1}
              - {name: expense_date, type: date, comment: 利用日}
              - {name: category_code, type: str, len: 30, comment: 経費区分}
              - {name: description, type: str, len: 255}
              - {name: amount, type: dec, p: 18, s: 2, default: 0}
              - {name: tax_code, type: str, len: 20}
              - {name: has_receipt, type: bool, default: false}

  - id: attendance
    label: 勤怠
    label_zh: 考勤
    entities:
      - name: WorkCalendar
        table: fin_work_calendar
        columns:
          - {name: calendar_date, type: date, nullable: false, index: true, comment: 日付}
          - {name: day_type, type: str, len: 20, default: workday, comment: workday/holiday/company_holiday}
          - {name: name, type: str, len: 100, comment: 祝日名等}
      - name: ShiftPattern
        table: fin_shift_pattern
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: シフトコード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: start_time, type: str, len: 5, comment: HH:MM}
          - {name: end_time, type: str, len: 5, comment: HH:MM}
          - {name: break_minutes, type: int, default: 60, comment: 休憩分}
          - {name: is_active, type: bool, default: true}
      - name: EmployeeShift
        table: fin_employee_shift
        order_by: shift_date desc
        columns:
          - {name: employee_id, type: int, index: true}
          - {name: shift_date, type: date, nullable: false, index: true}
          - {name: shift_code, type: str, len: 30, comment: シフト}
      - name: AttendanceRecord
        table: fin_attendance_record
        order_by: work_date desc
        columns:
          - {name: employee_id, type: int, index: true, comment: 社員}
          - {name: employee_name, type: str, len: 100}
          - {name: work_date, type: date, nullable: false, index: true, comment: 勤務日}
          - {name: clock_in, type: datetime, comment: 出勤}
          - {name: clock_out, type: datetime, comment: 退勤}
          - {name: break_minutes, type: int, default: 0, comment: 休憩分}
          - {name: work_minutes, type: int, default: 0, comment: 実働分}
          - {name: overtime_minutes, type: int, default: 0, comment: 残業分}
          - {name: status, type: str, len: 20, default: normal, comment: normal/late/absent/leave}
      - name: LeaveType
        table: fin_leave_type
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: 休暇コード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: is_paid, type: bool, default: true, comment: 有給}
          - {name: is_active, type: bool, default: true}
      - name: LeaveRequest
        table: fin_leave_request
        order_by: start_date desc
        columns:
          - {name: employee_id, type: int, index: true}
          - {name: employee_name, type: str, len: 100}
          - {name: leave_code, type: str, len: 30, comment: 休暇区分}
          - {name: start_date, type: date, nullable: false}
          - {name: end_date, type: date, nullable: false}
          - {name: days, type: dec, p: 6, s: 2, default: 0, comment: 日数}
          - {name: reason, type: str, len: 255}
          - {name: status, type: str, len: 20, default: submitted, index: true, comment: submitted/approved/rejected}

  - id: payroll
    label: 給与
    label_zh: 薪资
    entities:
      - name: PayItem
        table: fin_pay_item
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: 支給控除項目コード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: item_type, type: str, len: 20, default: earning, comment: earning/deduction}
          - {name: is_taxable, type: bool, default: true, comment: 課税対象}
          - {name: account_code, type: str, len: 50, comment: 仕訳科目}
          - {name: is_active, type: bool, default: true}
      - name: EmployeePayItem
        table: fin_employee_pay_item
        columns:
          - {name: employee_id, type: int, index: true}
          - {name: pay_item_code, type: str, len: 30}
          - {name: amount, type: dec, p: 18, s: 2, default: 0, comment: 固定額}
      - name: SocialInsuranceProfile
        table: fin_social_insurance_profile
        columns:
          - {name: employee_id, type: int, index: true, unique: true}
          - {name: health_insurance_grade, type: int, comment: 健康保険等級}
          - {name: pension_grade, type: int, comment: 厚生年金等級}
          - {name: standard_monthly, type: dec, p: 18, s: 2, default: 0, comment: 標準報酬月額}
          - {name: dependents, type: int, default: 0, comment: 扶養人数}
      - name: WithholdingTaxTable
        table: fin_withholding_tax_table
        columns:
          - {name: version, type: str, len: 20, index: true, comment: 税表バージョン}
          - {name: min_amount, type: dec, p: 18, s: 2, default: 0, comment: 下限}
          - {name: max_amount, type: dec, p: 18, s: 2, comment: 上限}
          - {name: dependents, type: int, default: 0}
          - {name: tax_amount, type: dec, p: 18, s: 2, default: 0, comment: 源泉税額}
      - name: PayrollRun
        table: fin_payroll_run
        order_by: target_month desc
        columns:
          - {name: run_no, type: str, len: 40, index: true, comment: 給与計算番号}
          - {name: target_month, type: str, len: 7, nullable: false, index: true, comment: 対象年月}
          - {name: pay_date, type: date, comment: 支給日}
          - {name: status, type: str, len: 20, default: draft, index: true, comment: draft/calculated/confirmed/paid}
          - {name: total_gross, type: dec, p: 18, s: 2, default: 0, comment: 総支給}
          - {name: total_deduction, type: dec, p: 18, s: 2, default: 0, comment: 総控除}
          - {name: total_net, type: dec, p: 18, s: 2, default: 0, comment: 差引支給}
        children:
          - name: PayrollRunLine
            table: fin_payroll_run_line
            parent_fk: run_id
            columns:
              - {name: employee_id, type: int, index: true}
              - {name: employee_name, type: str, len: 100}
              - {name: gross_amount, type: dec, p: 18, s: 2, default: 0, comment: 総支給}
              - {name: deduction_amount, type: dec, p: 18, s: 2, default: 0, comment: 控除合計}
              - {name: net_amount, type: dec, p: 18, s: 2, default: 0, comment: 差引支給}
              - {name: detail_json, type: text, comment: 項目別明細}

  - id: hr
    label: 人事
    label_zh: 人事
    entities:
      - name: Employee
        table: fin_employee
        order_by: employee_no
        columns:
          - {name: employee_no, type: str, len: 30, nullable: false, unique: true, comment: 社員番号}
          - {name: name, type: str, len: 100, nullable: false, comment: 氏名}
          - {name: name_kana, type: str, len: 100, comment: カナ}
          - {name: user_id, type: int, comment: users.id 連携}
          - {name: department_code, type: str, len: 50, comment: 部門}
          - {name: email, type: str, len: 200}
          - {name: hire_date, type: date, comment: 入社日}
          - {name: leave_date, type: date, comment: 退社日}
          - {name: employment_type, type: str, len: 20, default: regular, comment: regular/contract/part_time}
          - {name: status, type: str, len: 20, default: active, index: true, comment: active/retired}
      - name: EmploymentContract
        table: fin_employment_contract
        order_by: start_date desc
        columns:
          - {name: employee_id, type: int, index: true}
          - {name: contract_type, type: str, len: 30, comment: 契約種別}
          - {name: start_date, type: date, nullable: false}
          - {name: end_date, type: date}
          - {name: base_salary, type: dec, p: 18, s: 2, default: 0, comment: 基本給}
          - {name: remarks, type: str, len: 255}
      - name: YearEndAdjustment
        table: fin_year_end_adjustment
        order_by: target_year desc
        columns:
          - {name: employee_id, type: int, index: true}
          - {name: target_year, type: int, nullable: false, index: true, comment: 対象年}
          - {name: total_income, type: dec, p: 18, s: 2, default: 0, comment: 給与収入}
          - {name: deduction_total, type: dec, p: 18, s: 2, default: 0, comment: 所得控除合計}
          - {name: tax_settled, type: dec, p: 18, s: 2, default: 0, comment: 年調後税額}
          - {name: refund_amount, type: dec, p: 18, s: 2, default: 0, comment: 還付/追徴}
          - {name: status, type: str, len: 20, default: draft, comment: draft/confirmed}

  - id: master
    label: 経理マスタ
    label_zh: 财务主数据
    entities:
      - name: Account
        table: fin_account
        order_by: code
        columns:
          - {name: code, type: str, len: 50, nullable: false, unique: true, comment: 勘定科目コード}
          - {name: name, type: str, len: 100, nullable: false, comment: 科目名}
          - {name: account_type, type: str, len: 20, nullable: false, index: true, comment: asset/liability/equity/revenue/expense}
          - {name: parent_code, type: str, len: 50, comment: 親科目}
          - {name: default_tax_code, type: str, len: 20, comment: 既定税区分}
          - {name: is_active, type: bool, default: true}
          - {name: sort_order, type: int, default: 0}
      - name: TaxCode
        table: fin_tax_code
        order_by: code
        columns:
          - {name: code, type: str, len: 20, nullable: false, unique: true, comment: 税区分コード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: rate, type: dec, p: 6, s: 3, default: 0, comment: 税率(%)}
          - {name: kind, type: str, len: 20, default: taxable, comment: taxable/exempt/non_taxable}
          - {name: is_active, type: bool, default: true}
      - name: Partner
        table: fin_partner
        order_by: code
        columns:
          - {name: code, type: str, len: 50, nullable: false, unique: true, comment: 取引先コード}
          - {name: name, type: str, len: 200, nullable: false}
          - {name: partner_type, type: str, len: 20, default: customer, index: true, comment: customer/supplier/both}
          - {name: customer_id, type: int, comment: ERP customer.id 連携}
          - {name: supplier_id, type: int, comment: ERP supplier.id 連携}
          - {name: closing_day, type: int, comment: 締め日}
          - {name: payment_terms, type: str, len: 100, comment: 支払条件}
          - {name: is_active, type: bool, default: true}
      - name: BankAccount
        table: fin_bank_account
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: 口座コード}
          - {name: bank_name, type: str, len: 100, comment: 銀行名}
          - {name: branch_name, type: str, len: 100, comment: 支店名}
          - {name: account_type, type: str, len: 20, default: ordinary, comment: ordinary/checking}
          - {name: account_number, type: str, len: 30}
          - {name: account_holder, type: str, len: 100}
          - {name: gl_account_code, type: str, len: 50, comment: 対応勘定科目}
          - {name: is_active, type: bool, default: true}

  - id: settings
    label: 設定
    label_zh: 设置
    entities:
      - name: CompanySettings
        table: fin_company_settings
        singleton: true
        columns:
          - {name: company_name, type: str, len: 200, comment: 会社名}
          - {name: fiscal_start_month, type: int, default: 4, comment: 期首月}
          - {name: tax_method, type: str, len: 20, default: invoice, comment: 税方式 invoice/standard}
          - {name: rounding, type: str, len: 20, default: round, comment: 端数処理 round/floor/ceil}
          - {name: base_currency, type: str, len: 10, default: JPY}
      - name: ApprovalFlow
        table: fin_approval_flow
        columns:
          - {name: code, type: str, len: 30, nullable: false, unique: true, comment: フローコード}
          - {name: name, type: str, len: 100, nullable: false}
          - {name: target_type, type: str, len: 30, comment: expense/leave/payroll}
          - {name: steps_json, type: text, comment: 承認ステップ定義}
          - {name: is_active, type: bool, default: true}
      - name: ApprovalInstance
        table: fin_approval_instance
        order_by: created_at desc
        columns:
          - {name: flow_code, type: str, len: 30, index: true}
          - {name: target_type, type: str, len: 30}
          - {name: target_id, type: bigint, index: true}
          - {name: current_step, type: int, default: 0}
          - {name: status, type: str, len: 20, default: pending, comment: pending/approved/rejected}

  - id: integration
    label: 連携
    label_zh: 集成
    entities:
      - name: IntegrationExportLog
        table: fin_integration_export_log
        order_by: created_at desc
        columns:
          - {name: export_type, type: str, len: 30, index: true, comment: freee/yayoi/csv}
          - {name: target_period, type: str, len: 7, comment: 対象年月}
          - {name: record_count, type: int, default: 0}
          - {name: file_name, type: str, len: 255}
          - {name: status, type: str, len: 20, default: success, comment: success/failed}
          - {name: message, type: str, len: 500}

  - id: common
    label: 共通
    label_zh: 公共
    entities:
      - name: Attachment
        table: fin_attachment
        order_by: created_at desc
        columns:
          - {name: ref_type, type: str, len: 40, index: true, comment: 関連種別}
          - {name: ref_id, type: bigint, index: true, comment: 関連ID}
          - {name: file_name, type: str, len: 255}
          - {name: file_path, type: str, len: 500}
          - {name: content_type, type: str, len: 100}
          - {name: file_size, type: bigint, default: 0}

# -----------------------------------------------------------------------------
# メニュー（侧栏 + ルート + 画面生成のソース）
# leaf の view: home|list|form|report|workflow|batch
#   list/form/workflow/batch -> entity(api) を CRUD
#   report -> entity を読み取り専用表示
#   home -> KPI + カードのダッシュボード
# -----------------------------------------------------------------------------
menus:
  - code: FIN
    name: 経理・原価・人事
    name_zh: 财务·成本·人事
    name_en: Finance, Costing & HR
    icon: Money
    children:
      - {code: FIN_HOME, name: ホーム, subtitle: 経理・原価・人事のトップメニュー, name_zh: 首页, name_en: Home, icon: HomeFilled, path: /fin, view: home, home: fin_root}

      - code: FIN_COSTING
        name: 原価管理
        desc: 標準・実際原価・配賦・WIP
        name_zh: 成本管理
        name_en: Costing
        icon: Coin
        children:
          - {code: FIN_COSTING_HOME, name: 原価ホーム, path: /fin/costing, icon: HomeFilled}
          - {code: FIN_COSTING_STANDARD, name: 標準原価計算, path: /fin/costing/standard, icon: Coin}
          - {code: FIN_COSTING_ACTUAL, name: 実際原価計算, path: /fin/costing/actual, icon: DataLine}
          - {code: FIN_COSTING_VARIANCE, name: 原価差異分析, path: /fin/costing/variance, icon: TrendCharts}
