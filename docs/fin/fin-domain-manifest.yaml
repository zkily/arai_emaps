# -----------------------------------------------------------------------------
# ERP -> FIN 集成事件（fin_journal_source へ起票）
# -----------------------------------------------------------------------------
integrations:
  - {event: SALES_POSTED,        source_module: erp,     description: 売上計上,       debit: 売掛金,   credit: 売上高}
  - {event: INVOICE_ISSUED,      source_module: erp,     description: 請求書発行,     debit: 売掛金,   credit: 売上高}
  - {event: PURCHASE_RECEIVED,   source_module: erp,     description: 材料・部品受入, debit: 仕入高,   credit: 買掛金}
  - {event: OUTSOURCING_RECEIVED,source_module: erp,     description: 外注受入,       debit: 外注加工費, credit: 買掛金}
  - {event: INVENTORY_ADJUST,    source_module: erp,     description: 棚卸差異,       debit: 棚卸資産,  credit: 棚卸差額}
  - {event: COSTING_CLOSE,       source_module: erp,     description: 原価締め,       debit: 製品,     credit: 仕掛品}
  - {event: DEPRECIATION,        source_module: erp,     description: 減価償却,       debit: 減価償却費, credit: 減価償却累計額}
  - {event: PAYROLL_POSTED,      source_module: payroll, description: 給与確定,       debit: 給与手当,  credit: 未払費用}
  - {event: EXPENSE_APPROVED,    source_module: expense, description: 経費承認,       debit: 経費,     credit: 未払金}

# -----------------------------------------------------------------------------
# 旧 ERP 原価ページ -> FIN リダイレクト
# -----------------------------------------------------------------------------
redirects:
  - {from: /erp/costing/journal,            to: /fin/accounting/journals}
  - {from: /erp/costing/accounting-export,  to: /fin/accounting/import}
  - {from: /erp/costing/billing,            to: /fin/receivables/invoices}
  - {from: /erp/costing/payment,            to: /fin/payables/payments}
